<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;800&family=Dancing+Script:wght@400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="main-title-wrapper">
    <button id="toggle-color-btn">Переключить цвета</button>
    <button id="change-color-all-cards">сменить цвет всех карточек</button>
    <button id="change-color-first-card">сменить цвет первой карточки</button>
    <button id="open-google">открыть Google.com</button>
    <button id="output-console-log">вывести сообщение в консоль лог</button>
    <h1 class="choose-product-text">Выбери свой продукт</h1>
    <template id="product-card-template">
      <li class="card-container">
        <img class="product-image" width="290" height="245">
        <span class="product-category"></span>
        <h2 class="product-name"></h2>
        <p class="product-description"></p>
        <span>Состав:</span>
        <ul class="product-compound">
          <li class="product-compound-item"></li>
          <li class="product-compound-item"></li>
          <li class="product-compound-item"></li>
        </ul>
        <div class="product-price-container">
          <span class="product-price-label">Цена</span>
          <span class="product-price"></span>
        </div>
      </li>
    </template>
    <ul class="product-card-list"></ul>
  </div>
  <script src="main.js"></script>
  <script src="products-data.js" type="module"></script>
  <script src="homework-8.js" type="module"></script>
</body>
</html>
